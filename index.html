<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Prediction Webpage</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        form { margin: 20px; }\n        label { display: block; margin: 5px 0; }\n        input { margin: 10px 0; }\n        button { margin-top: 10px; }\n    </style>\n</head>\n<body>\n    <h1>Prediction Input Form</h1>\n    <form id="predictionForm">\n        <label for="model">Select Model:</label>\n        <select id="model">\n            <option value="model1">Model 1</option>\n            <option value="model2">Model 2</option>\n            <option value="model3">Model 3</option>\n        </select>\n        <label for="inputData">Enter Data:</label>\n        <input type="text" id="inputData" required />\n        <button type="submit">Make Prediction</button>\n    </form>\n    <div id="result"></div>\n    <script>\n        document.getElementById('predictionForm').addEventListener('submit', function(e) {\n            e.preventDefault();\n            const model = document.getElementById('model').value;\n            const inputData = document.getElementById('inputData').value;\n            document.getElementById('result').innerText = `You selected ${model} with input data: ${inputData}`;\n        });\n    </script>\n</body>\n</html>
