<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: #333;
        }
        header {
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #4a90e2;
        }
        .model {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <header>
        <h1>Prediction Models</h1>
    </header>
    <div class="container">
        <div class="model">
            <h2>Random Forest Model</h2>
            <p>Root Mean Squared Error (RMSE): [Insert RMSE data]</p>
            <p>Confidence Intervals: [Insert Confidence Interval data]</p>
        </div>
        <div class="model">
            <h2>XGBoost Model</h2>
            <p>Root Mean Squared Error (RMSE): [Insert RMSE data]</p>
            <p>Confidence Intervals: [Insert Confidence Interval data]</p>
        </div>
    </div>
    <footer class="footer">
        <p>&copy; 2026 Prediction Machine</p>
    </footer>
</body>
</html>
